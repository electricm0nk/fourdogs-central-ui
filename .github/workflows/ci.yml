name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  require-develop-source:
    name: require-develop-source
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Fail unless PR source branch is develop
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$BASE_REF" != "main" ]]; then
            echo "Not a PR to main; guard not applicable."
            exit 0
          fi

          if [[ "$HEAD_REF" != "develop" ]]; then
            echo "::error::PRs into main must originate from develop. Found source branch: $HEAD_REF"
            exit 1
          fi

          echo "Source branch is develop; guard passed."

  build-and-test:
    runs-on: ubuntu-latest
    env:
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --run

      - name: Type check
        run: npx tsc --noEmit

      - name: Dispatch fourdogs-central CI (prod)
        if: github.ref == 'refs/heads/main' && env.CROSS_REPO_PAT != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: electricm0nk/fourdogs-central
          event-type: ui-build-complete
          client-payload: '{"sha": "${{ github.sha }}"}'

      - name: Dispatch fourdogs-central CI (dev)
        if: github.ref == 'refs/heads/develop' && env.CROSS_REPO_PAT != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: electricm0nk/fourdogs-central
          event-type: ui-build-complete-dev
          client-payload: '{"sha": "${{ github.sha }}"}'
