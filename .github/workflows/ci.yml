name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --run

      - name: Type check
        run: npx tsc --noEmit

      - name: Dispatch fourdogs-central CI (prod)
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: electricm0nk/fourdogs-central
          event-type: ui-build-complete
          client-payload: '{"sha": "${{ github.sha }}"}'

      - name: Dispatch fourdogs-central CI (dev)
        if: github.ref == 'refs/heads/develop'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: electricm0nk/fourdogs-central
          event-type: ui-build-complete-dev
          client-payload: '{"sha": "${{ github.sha }}"}'
